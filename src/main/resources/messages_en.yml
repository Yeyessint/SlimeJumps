# SlimeJumps messages — English
# Color codes use '&'. {placeholders} are replaced by the plugin.

prefix: '&7SlimeJumps &a» '

no-permission: '{prefix}&cYou do not have permission to do that.'
players-only: '{prefix}&cThis command can only be used by players.'
reloaded: '{prefix}&aConfiguration and pads reloaded.'

pad-created: '{prefix}&ePad &a{name}&e created &7(power {power}, vertical {vertical})&e.'
pad-exists: '{prefix}&cA pad named &e{name}&c (or a pad on this block) already exists.'
pad-removed: '{prefix}&ePad &a{name}&e removed.'
pad-not-found: '{prefix}&cNo pad named &e{name}&c was found.'
pad-updated: '{prefix}&ePad &a{name}&e updated: {setting} is now &a{value}&e.'
pad-teleported: '{prefix}&eTeleported to pad &a{name}&e.'
pad-world-unloaded: '{prefix}&cThe world of pad &e{name}&c is not loaded.'

pad-detail: '&7   route: &e{route}&7, direction: &e{direction}&7, sound: &e{sound}&7, particle: &e{particle}'
pad-route-set: '{prefix}&ePad &a{name}&e now flies players along route &a{route}&e.'
pad-route-cleared: '{prefix}&ePad &a{name}&e is a regular directional pad again.'
pad-direction-look: '{prefix}&ePad &a{name}&e now launches players where they look.'
pad-direction-fixed: '{prefix}&ePad &a{name}&e now always launches towards yaw &a{yaw}°&e.'

route-created: '{prefix}&eRoute &a{name}&e created with its first waypoint at your position. Add more with &a/sj route addpoint {name}&e.'
route-exists: '{prefix}&cA route named &e{name}&c already exists.'
route-not-found: '{prefix}&cNo route named &e{name}&c was found.'
route-removed: '{prefix}&eRoute &a{name}&e removed and unlinked from all pads.'
route-point-added: '{prefix}&eWaypoint &a#{count}&e added to route &a{name}&e.'
route-point-removed: '{prefix}&eWaypoint &a#{index}&e removed from route &a{name}&e (&a{count}&e left).'
route-invalid-index: '{prefix}&cInvalid waypoint number. Route &e{name}&c has &e{count}&c waypoint(s).'
route-list-empty: '{prefix}&eThere are no routes yet. Create one with &a/sj route create <name>&e.'
route-list-header: '{prefix}&eRoutes (&a{count}&e):'
route-list-entry: '&7 • &a{name} &7— {count} waypoint(s)'
route-info-header: '{prefix}&eRoute &a{name}&e (&a{count}&e waypoints):'
route-info-point: '&7   &a#{index} &7— {world} ({x}, {y}, {z})'

invalid-number: '{prefix}&c''{input}'' is not a valid number.'
invalid-name: '{prefix}&cPad names may only contain letters, numbers, ''-'' and ''_'' (max 32 characters).'
invalid-particle: '{prefix}&c''{input}'' is not a valid particle name.'

list-empty: '{prefix}&eThere are no jump pads yet. Create one with &a/sj create <name>&e.'
list-header: '{prefix}&eJump pads (&a{count}&e):'
list-entry: '&7 • &a{name} &7— {world} ({x}, {y}, {z}) &epower {power}&7, &evertical {vertical}'

usage-create: '{prefix}&cUsage: &e/sj create <name> [power] [vertical]'
usage-remove: '{prefix}&cUsage: &e/sj remove <name>'
usage-info: '{prefix}&cUsage: &e/sj info <name>'
usage-tp: '{prefix}&cUsage: &e/sj tp <name>'
usage-setpower: '{prefix}&cUsage: &e/sj setpower <name> <value>'
usage-setvertical: '{prefix}&cUsage: &e/sj setvertical <name> <value>'
usage-setroute: '{prefix}&cUsage: &e/sj setroute <pad> <route|none>'
usage-setdirection: '{prefix}&cUsage: &e/sj setdirection <pad> <look|here>'
usage-setsound: '{prefix}&cUsage: &e/sj setsound <pad> <sound|default>'
usage-setparticle: '{prefix}&cUsage: &e/sj setparticle <pad> <particle|default>'
usage-route: '{prefix}&cUsage: &e/sj route <create|addpoint|delpoint|remove|list|info>'
usage-route-create: '{prefix}&cUsage: &e/sj route create <name>'
usage-route-addpoint: '{prefix}&cUsage: &e/sj route addpoint <name>'
usage-route-delpoint: '{prefix}&cUsage: &e/sj route delpoint <name> <number>'
usage-route-remove: '{prefix}&cUsage: &e/sj route remove <name>'
usage-route-info: '{prefix}&cUsage: &e/sj route info <name>'

help:
  - '&a&m--------------&a&l SlimeJumps &a&m--------------'
  - '&a/sj create <name> [power] [vertical] &7— Create a pad on the block you stand on'
  - '&a/sj remove <name> &7— Delete a pad'
  - '&a/sj list &7— List all pads'
  - '&a/sj info <name> &7— Show details of a pad'
  - '&a/sj tp <name> &7— Teleport to a pad'
  - '&a/sj setpower <name> <value> &7— Change the horizontal strength'
  - '&a/sj setvertical <name> <value> &7— Change the vertical strength'
  - '&a/sj setroute <pad> <route|none> &7— Make a pad fly players along a route'
  - '&a/sj setdirection <pad> <look|here> &7— Launch where players look, or in a fixed direction'
  - '&a/sj setsound <pad> <sound|default> &7— Per-pad launch sound'
  - '&a/sj setparticle <pad> <particle|default> &7— Per-pad launch particle'
  - '&a/sj route create <name> &7— Create a flight route at your position'
  - '&a/sj route addpoint <name> &7— Append your position to a route'
  - '&a/sj route delpoint <name> <number> &7— Remove a waypoint'
  - '&a/sj route remove <name> &7— Delete a route'
  - '&a/sj route list &7— List all routes'
  - '&a/sj route info <name> &7— Show a route''s waypoints'
  - '&a/sj reload &7— Reload configuration, pads and routes'
  - '&a&m--------------------------------------------'
