# Interactive tutorial (/sj tutorial)
tutorial-pick-language: '{prefix}&eChoose a language for the tutorial:'
tutorial-language-en: '&a  ▸ English'
tutorial-language-es: '&a  ▸ Español'
tutorial-language-hover: '&7Click to start the tutorial in this language'
tutorial-language-unknown: '{prefix}&cUnknown language ''{input}''.'
tutorial-header: '&2&m     &r &a&lStep {step}&7/&a&l{total} &8— &f&l{title} &2&m     '
tutorial-try: '&e&l[ ⏵ Try:&r&e {command} &l]'
tutorial-try-hover: '&7Click to put this command in your chat box, then press enter'
tutorial-back: '&7[ &f« Back &7]'
tutorial-back-hover: '&7Previous step'
tutorial-next: '&a[ &fNext » &a]'
tutorial-next-hover: '&7Next step'
tutorial-finish: '&a[ &f✔ Finish &a]'
tutorial-finish-hover: '&7End the tutorial'
tutorial-stopped: '{prefix}&eTutorial closed. Type &a/sj tutorial&e any time to resume.'

tutorial-1-title: 'Welcome to SlimeJumps'
tutorial-1-body:
  - '&7SlimeJumps adds &ajump pads&7 — the launch pads found in lobbies'
  - '&7that fling players into the air when they step on them.'
  - '&7You can also build &aflight routes&7, &acharge pads&7 and &adouble jumps&7.'
  - '&8Great for: lobby parkour, hub → minigame launchers, bouncy castles,'
  - '&8cannon rides, secret shortcuts and hidden jumps.'
  - '&7Click &aNext »&7 to create your first pad.'
tutorial-2-title: 'Create your first pad'
tutorial-2-body:
  - '&7Stand on the block you want to turn into a pad and run:'
  - '&a  /sj create <name> [power] [vertical]'
  - '&8• &7name &8= a unique id, e.g. &fspawn&8 (letters, numbers, - and _)'
  - '&8• &7power &8= horizontal push &7(optional, default 1.6)'
  - '&8• &7vertical &8= upward push &7(optional, default 1.0)'
  - '&7Example: &f/sj create spawn&7 — then walk onto the block!'
tutorial-3-title: 'Tune the launch & preview it'
tutorial-3-body:
  - '&7Change the strength any time without recreating the pad:'
  - '&a  /sj setpower spawn 2.5   &8(further)'
  - '&a  /sj setvertical spawn 1.3 &8(higher)'
  - '&7Not sure where players land? &aPreview the exact arc:'
  - '&a  /sj preview spawn'
  - '&8It draws the trajectory with particles for a few seconds.'
tutorial-4-title: 'Make it look & feel great'
tutorial-4-body:
  - '&7Give each pad its own effects:'
  - '&a  /sj setparticle spawn FIREWORK'
  - '&a  /sj setsound spawn entity.bat.takeoff'
  - '&a  /sj seteffect spawn SPEED 5 1   &8(effect, seconds, level)'
  - '&a  /sj sethologram spawn &f&aJUMP!&7|&fto spawn   &8(| = new line)'
  - '&a  /sj setmessage spawn &fWheee!   &8(shown in the action bar)'
tutorial-5-title: 'The editor wand'
tutorial-5-body:
  - '&7Prefer clicking to typing? Grab the wand:'
  - '&a  /sj wand'
  - '&8• &7Left click&8 a block → create a pad instantly'
  - '&8• &7Right click&8 a pad → remove it'
  - '&7Perfect for placing lots of pads quickly while building.'
tutorial-6-title: 'Flight routes'
tutorial-6-body:
  - '&7Routes carry players flying through waypoints to a destination:'
  - '&a  /sj route create lobby2arena'
  - '&a  /sj route edit lobby2arena   &8(visual editor + wand)'
  - '&8In edit mode: left click adds a waypoint, right click removes one.'
  - '&7Then link a pad to the route:'
  - '&a  /sj setroute spawn lobby2arena'
tutorial-7-title: 'Charge pads & presets'
tutorial-7-body:
  - '&7Turn a pad into a &acharge pad&7 — hold to power up, release to fly:'
  - '&a  /sj setcharge spawn 1500   &8(ms to fully charge; off to disable)'
  - '&7Or create ready-made pads instantly with &apresets&7:'
  - '&a  /sj create jump1 --preset parkour'
  - '&8Presets: &fparkour&8 (snappy), &fcannon&8 (powerful), &fbounce&8 (straight up).'
  - '&7Add your own presets in &fconfig.yml&7.'
tutorial-8-title: 'You are ready!'
tutorial-8-body:
  - '&7A few last tips:'
  - '&8• &a/sj menu &8— a clickable menu to create pads & routes'
  - '&8• &a/sj gui &8— browse & teleport to every pad'
  - '&8• &a/sj list&8, &a/sj near&8, &a/sj stats &8— find & track pads'
  - '&8• Enable &adouble jump&8 and pick a &alanguage&8 in &fconfig.yml'
  - '&8• Placeholders like &f%slimejumps_player_launches%&8 work with PlaceholderAPI'
  - '&7Click &a✔ Finish&7 to close the tutorial.'
tutorial-finished:
  - '&2&m                                            '
  - '&a&lThat''s it! &7You now know the essentials of SlimeJumps.'
  - '&7Full docs: &fgithub.com/Yeyessint/SlimeJumps'
  - '&7Reopen anytime with &a/sj tutorial&7 · full command list: &a/sj help'
  - '&2&m                                            '

help:
  - '&a&m--------------&a&l SlimeJumps &a&m--------------'
  - '&a/sj create <name> [power] [vertical] &7— Create a pad on the block you stand on'
  - '&a/sj create <name> --preset <preset> &7— Create a pad from a preset (parkour, cannon, bounce…)'
  - '&a/sj wand &7— Get the editor wand (left click creates, right click removes)'
  - '&a/sj remove <name> &7— Delete a pad'
  - '&a/sj list &7— List all pads'
  - '&a/sj info <name> &7— Show details of a pad'
  - '&a/sj tp <name> &7— Teleport to a pad'
  - '&a/sj tutorial &7— Interactive step-by-step tutorial'
  - '&a/sj menu &7— Clickable menu to create pads & routes'
  - '&a/sj gui &7— Browse all pads in a menu (click to teleport)'
  - '&a/sj near [radius] &7— List pads close to you'
  - '&a/sj stats &7— Launch statistics and most used pads'
  - '&a/sj toggle <pad> &7— Enable or disable a pad'
  - '&a/sj rename <pad> <newname> &7— Rename a pad'
  - '&a/sj seteffect <pad> <effect|none> [s] [lvl] &7— Potion effect on use'
  - '&a/sj setmessage <pad> <text|none> &7— Action bar message on use'
  - '&a/sj sethologram <pad> <text|none> &7— Floating hologram above the pad'
  - '&a/sj setcharge <pad> <ms|off> &7— Turn a pad into a charge pad'
  - '&a/sj preview <pad> &7— Draw the pad''s launch trajectory with particles'
  - '&a/sj route edit <name> &7— Visual route editor (wand adds/removes waypoints)'
  - '&a/sj setpower <name> <value> &7— Change the horizontal strength'
  - '&a/sj setvertical <name> <value> &7— Change the vertical strength'
  - '&a/sj setcooldown <pad> <ms|default> &7— Per-pad cooldown'
  - '&a/sj setcommand <pad> <command|none> &7— Console command run on use'
  - '&a/sj setroute <pad> <route|none> &7— Make a pad fly players along a route'
  - '&a/sj setdirection <pad> <look|here> &7— Launch where players look, or in a fixed direction'
  - '&a/sj setsound <pad> <sound|default> &7— Per-pad launch sound'
  - '&a/sj setparticle <pad> <particle|default> &7— Per-pad launch particle'
  - '&a/sj route create <name> &7— Create a flight route at your position'
  - '&a/sj route addpoint <name> &7— Append your position to a route'
  - '&a/sj route delpoint <name> <number> &7— Remove a waypoint'
  - '&a/sj route remove <name> &7— Delete a route'
  - '&a/sj route list &7— List all routes'
  - '&a/sj route info <name> &7— Show a route''s waypoints'
  - '&a/sj reload &7— Reload configuration, pads and routes'
  - '&a&m--------------------------------------------'
