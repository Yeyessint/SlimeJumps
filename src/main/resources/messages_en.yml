# SlimeJumps messages — English
# Color codes use '&'. {placeholders} are replaced by the plugin.

prefix: '&7SlimeJumps &a» '

no-permission: '{prefix}&cYou do not have permission to do that.'
players-only: '{prefix}&cThis command can only be used by players.'
reloaded: '{prefix}&aConfiguration and pads reloaded.'

pad-created: '{prefix}&ePad &a{name}&e created &7(power {power}, vertical {vertical})&e.'
pad-exists: '{prefix}&cA pad named &e{name}&c (or a pad on this block) already exists.'
pad-removed: '{prefix}&ePad &a{name}&e removed.'
pad-not-found: '{prefix}&cNo pad named &e{name}&c was found.'
pad-updated: '{prefix}&ePad &a{name}&e updated: {setting} is now &a{value}&e.'
pad-teleported: '{prefix}&eTeleported to pad &a{name}&e.'
pad-world-unloaded: '{prefix}&cThe world of pad &e{name}&c is not loaded.'

pad-detail: '&7   status: &e{status}&7, route: &e{route}&7, direction: &e{direction}&7, sound: &e{sound}&7, particle: &e{particle}&7, cooldown: &e{cooldown}&7, charge: &e{charge}&7, command: &e{command}&7, effect: &e{effect}&7, message: &e{message}'
pad-command-set: '{prefix}&ePad &a{name}&e now runs: &a/{command}'
pad-command-cleared: '{prefix}&ePad &a{name}&e no longer runs a command.'
pad-enabled: '{prefix}&ePad &a{name}&e is now &aenabled&e.'
pad-disabled: '{prefix}&ePad &a{name}&e is now &cdisabled&e.'
pad-renamed: '{prefix}&ePad &a{old}&e renamed to &a{name}&e.'
pad-effect-set: '{prefix}&ePad &a{name}&e now applies &a{effect} {level}&e for &a{duration}s&e.'
pad-effect-cleared: '{prefix}&ePad &a{name}&e no longer applies an effect.'
pad-message-set: '{prefix}&ePad &a{name}&e now shows: &r{message}'
pad-message-cleared: '{prefix}&ePad &a{name}&e no longer shows a message.'
pad-hologram-set: '{prefix}&ePad &a{name}&e now has a hologram: &r{text}'
pad-hologram-cleared: '{prefix}&ePad &a{name}&e no longer has a hologram.'
pad-charge-set: '{prefix}&ePad &a{name}&e now charges for &a{ms}ms&e before launching.'
pad-charge-cleared: '{prefix}&ePad &a{name}&e launches instantly again.'

preview-started: '{prefix}&eShowing the trajectory of pad &a{name}&e for a few seconds…'
charge-bar: '&a{filled}&8{empty} &e{percent}%'
charge-cancelled: '&7Charge cancelled.'

route-edit-enter: '{prefix}&eEditing route &a{name}&e — wand left click adds a waypoint at your position, right click removes the nearest one. Run the command again to finish.'
route-edit-exit: '{prefix}&eFinished editing route &a{name}&e.'
route-edit-no-point: '{prefix}&cNo waypoint within 3 blocks of you.'

wand-name: '&a&lSlimeJumps Wand'
wand-lore-create: '&7Left click a block: &ecreate a pad'
wand-lore-remove: '&7Right click a pad: &eremove it'
wand-given: '{prefix}&eYou received the pad wand. Left click creates, right click removes.'
wand-created: '{prefix}&ePad &a{name}&e created with the wand.'
wand-pad-here: '{prefix}&cThis block is already a pad.'
wand-no-pad: '{prefix}&cThis block is not a pad.'

invalid-preset: '{prefix}&cUnknown preset ''{input}''. Available: &e{presets}&c.'
pad-route-set: '{prefix}&ePad &a{name}&e now flies players along route &a{route}&e.'
pad-route-cleared: '{prefix}&ePad &a{name}&e is a regular directional pad again.'
pad-direction-look: '{prefix}&ePad &a{name}&e now launches players where they look.'
pad-direction-fixed: '{prefix}&ePad &a{name}&e now always launches towards yaw &a{yaw}°&e.'

route-created: '{prefix}&eRoute &a{name}&e created with its first waypoint at your position. Add more with &a/sj route addpoint {name}&e.'
route-exists: '{prefix}&cA route named &e{name}&c already exists.'
route-not-found: '{prefix}&cNo route named &e{name}&c was found.'
route-removed: '{prefix}&eRoute &a{name}&e removed and unlinked from all pads.'
route-point-added: '{prefix}&eWaypoint &a#{count}&e added to route &a{name}&e.'
route-point-removed: '{prefix}&eWaypoint &a#{index}&e removed from route &a{name}&e (&a{count}&e left).'
route-invalid-index: '{prefix}&cInvalid waypoint number. Route &e{name}&c has &e{count}&c waypoint(s).'
route-list-empty: '{prefix}&eThere are no routes yet. Create one with &a/sj route create <name>&e.'
