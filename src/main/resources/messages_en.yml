list-empty: '{prefix}&eThere are no jump pads yet. Create one with &a/sj create <name>&e.'
list-header: '{prefix}&eJump pads (&a{count}&e):'
list-entry: '&7 • &a{name} &7— {world} ({x}, {y}, {z}) &epower {power}&7, &evertical {vertical}'

