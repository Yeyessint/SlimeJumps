# Mensajes de SlimeJumps — Español
# Los códigos de color usan '&'. Los {placeholders} los reemplaza el plugin.

prefix: '&7SlimeJumps &a» '

no-permission: '{prefix}&cNo tienes permiso para hacer eso.'
players-only: '{prefix}&cEste comando solo puede usarse por jugadores.'
reloaded: '{prefix}&aConfiguración y pads recargados.'

pad-created: '{prefix}&ePad &a{name}&e creado &7(potencia {power}, vertical {vertical})&e.'
pad-exists: '{prefix}&cYa existe un pad llamado &e{name}&c (o un pad en este bloque).'
pad-removed: '{prefix}&ePad &a{name}&e eliminado.'
pad-not-found: '{prefix}&cNo se encontró ningún pad llamado &e{name}&c.'
pad-updated: '{prefix}&ePad &a{name}&e actualizado: {setting} ahora es &a{value}&e.'
pad-teleported: '{prefix}&eTeletransportado al pad &a{name}&e.'
pad-world-unloaded: '{prefix}&cEl mundo del pad &e{name}&c no está cargado.'

pad-detail: '&7   estado: &e{status}&7, ruta: &e{route}&7, dirección: &e{direction}&7, sonido: &e{sound}&7, partícula: &e{particle}&7, cooldown: &e{cooldown}&7, comando: &e{command}&7, efecto: &e{effect}&7, mensaje: &e{message}'
pad-command-set: '{prefix}&eEl pad &a{name}&e ahora ejecuta: &a/{command}'
pad-command-cleared: '{prefix}&eEl pad &a{name}&e ya no ejecuta ningún comando.'
pad-enabled: '{prefix}&eEl pad &a{name}&e está ahora &aactivado&e.'
pad-disabled: '{prefix}&eEl pad &a{name}&e está ahora &cdesactivado&e.'
pad-renamed: '{prefix}&ePad &a{old}&e renombrado a &a{name}&e.'
pad-effect-set: '{prefix}&eEl pad &a{name}&e ahora aplica &a{effect} {level}&e durante &a{duration}s&e.'
pad-effect-cleared: '{prefix}&eEl pad &a{name}&e ya no aplica ningún efecto.'
pad-message-set: '{prefix}&eEl pad &a{name}&e ahora muestra: &r{message}'
pad-message-cleared: '{prefix}&eEl pad &a{name}&e ya no muestra ningún mensaje.'
pad-hologram-set: '{prefix}&eEl pad &a{name}&e ahora tiene un holograma: &r{text}'
pad-hologram-cleared: '{prefix}&eEl pad &a{name}&e ya no tiene holograma.'

wand-name: '&a&lVarita SlimeJumps'
wand-lore-create: '&7Clic izquierdo en un bloque: &ecrear pad'
wand-lore-remove: '&7Clic derecho en un pad: &eeliminarlo'
wand-given: '{prefix}&eHas recibido la varita de pads. Clic izquierdo crea, clic derecho elimina.'
wand-created: '{prefix}&ePad &a{name}&e creado con la varita.'
wand-pad-here: '{prefix}&cEste bloque ya es un pad.'
wand-no-pad: '{prefix}&cEste bloque no es un pad.'

invalid-preset: '{prefix}&cPreset ''{input}'' desconocido. Disponibles: &e{presets}&c.'
pad-route-set: '{prefix}&eEl pad &a{name}&e ahora lleva volando a los jugadores por la ruta &a{route}&e.'
pad-route-cleared: '{prefix}&eEl pad &a{name}&e vuelve a ser un pad direccional normal.'
pad-direction-look: '{prefix}&eEl pad &a{name}&e ahora lanza a los jugadores hacia donde miran.'
pad-direction-fixed: '{prefix}&eEl pad &a{name}&e ahora siempre lanza hacia el yaw &a{yaw}°&e.'

route-created: '{prefix}&eRuta &a{name}&e creada con su primer punto en tu posición. Añade más con &a/sj route addpoint {name}&e.'
route-exists: '{prefix}&cYa existe una ruta llamada &e{name}&c.'
route-not-found: '{prefix}&cNo se encontró ninguna ruta llamada &e{name}&c.'
route-removed: '{prefix}&eRuta &a{name}&e eliminada y desvinculada de todos los pads.'
route-point-added: '{prefix}&ePunto &a#{count}&e añadido a la ruta &a{name}&e.'
route-point-removed: '{prefix}&ePunto &a#{index}&e eliminado de la ruta &a{name}&e (quedan &a{count}&e).'
route-invalid-index: '{prefix}&cNúmero de punto inválido. La ruta &e{name}&c tiene &e{count}&c punto(s).'
route-list-empty: '{prefix}&eTodavía no hay rutas. Crea una con &a/sj route create <nombre>&e.'
route-list-header: '{prefix}&eRutas (&a{count}&e):'
route-list-entry: '&7 • &a{name} &7— {count} punto(s)'
route-info-header: '{prefix}&eRuta &a{name}&e (&a{count}&e puntos):'
route-info-point: '&7   &a#{index} &7— {world} ({x}, {y}, {z})'

invalid-number: '{prefix}&c''{input}'' no es un número válido.'
invalid-name: '{prefix}&cLos nombres solo pueden contener letras, números, ''-'' y ''_'' (máx. 32 caracteres).'
invalid-particle: '{prefix}&c''{input}'' no es un nombre de partícula válido.'
invalid-effect: '{prefix}&c''{input}'' no es un efecto de poción válido.'

gui-title: 'SlimeJumps — Pads ({page}/{pages})'
gui-pad-name: '&a&l{name}'
gui-pad-location: '&7{world} ({x}, {y}, {z})'
gui-pad-power: '&7Potencia: &e{power} &7Vertical: &e{vertical}'
gui-pad-route: '&7Ruta: &e{route}'
gui-pad-disabled: '&c✖ Desactivado'
gui-pad-click: '&eHaz clic para teletransportarte'
gui-previous: '&a« Página anterior'
gui-next: '&aPágina siguiente »'

near-empty: '{prefix}&eNo hay pads en un radio de &a{radius}&e bloques.'
near-header: '{prefix}&ePads en un radio de &a{radius}&e bloques (&a{count}&e):'
near-entry: '&7 • &a{name} &7— a {distance} bloques ({x}, {y}, {z})'

stats-header: '{prefix}&e&lEstadísticas de lanzamientos'
stats-total: '&7   Lanzamientos totales: &a{total}'
stats-empty: '&7   Todavía no se ha usado ningún pad.'
stats-entry: '&7   &a#{rank} &e{name} &7— &a{uses}&7 lanzamientos'

update-available: '{prefix}&e¡SlimeJumps &a{version}&e está disponible! Descárgalo en &agithub.com/Yeyessint/SlimeJumps/releases'

list-empty: '{prefix}&eTodavía no hay jump pads. Crea uno con &a/sj create <nombre>&e.'
list-header: '{prefix}&eJump pads (&a{count}&e):'
list-entry: '&7 • &a{name} &7— {world} ({x}, {y}, {z}) &epotencia {power}&7, &evertical {vertical}'

usage-create: '{prefix}&cUso: &e/sj create <nombre> [potencia] [vertical]'
usage-remove: '{prefix}&cUso: &e/sj remove <nombre>'
usage-info: '{prefix}&cUso: &e/sj info <nombre>'
usage-tp: '{prefix}&cUso: &e/sj tp <nombre>'
usage-setpower: '{prefix}&cUso: &e/sj setpower <nombre> <valor>'
usage-setvertical: '{prefix}&cUso: &e/sj setvertical <nombre> <valor>'
usage-sethologram: '{prefix}&cUso: &e/sj sethologram <pad> <texto...|none> &7(| = nueva línea)'
usage-toggle: '{prefix}&cUso: &e/sj toggle <pad>'
usage-rename: '{prefix}&cUso: &e/sj rename <pad> <nuevonombre>'
usage-seteffect: '{prefix}&cUso: &e/sj seteffect <pad> <efecto|none> [segundos] [nivel]'
usage-setmessage: '{prefix}&cUso: &e/sj setmessage <pad> <texto...|none> &7(%player% = nombre del jugador)'
usage-setcooldown: '{prefix}&cUso: &e/sj setcooldown <pad> <milisegundos|default>'
usage-setcommand: '{prefix}&cUso: &e/sj setcommand <pad> <comando...|none> &7(%player% = nombre del jugador)'
usage-setroute: '{prefix}&cUso: &e/sj setroute <pad> <ruta|none>'
usage-setdirection: '{prefix}&cUso: &e/sj setdirection <pad> <look|here>'
usage-setsound: '{prefix}&cUso: &e/sj setsound <pad> <sonido|default>'
usage-setparticle: '{prefix}&cUso: &e/sj setparticle <pad> <partícula|default>'
usage-route: '{prefix}&cUso: &e/sj route <create|addpoint|delpoint|remove|list|info>'
usage-route-create: '{prefix}&cUso: &e/sj route create <nombre>'
usage-route-addpoint: '{prefix}&cUso: &e/sj route addpoint <nombre>'
usage-route-delpoint: '{prefix}&cUso: &e/sj route delpoint <nombre> <número>'
usage-route-remove: '{prefix}&cUso: &e/sj route remove <nombre>'
usage-route-info: '{prefix}&cUso: &e/sj route info <nombre>'

help:
  - '&a&m--------------&a&l SlimeJumps &a&m--------------'
  - '&a/sj create <nombre> [potencia] [vertical] &7— Crea un pad en el bloque donde estás'
  - '&a/sj create <nombre> --preset <preset> &7— Crea un pad desde un preset (parkour, cannon, bounce…)'
  - '&a/sj wand &7— Consigue la varita de edición (clic izq. crea, clic der. elimina)'
  - '&a/sj remove <nombre> &7— Elimina un pad'
  - '&a/sj list &7— Lista todos los pads'
  - '&a/sj info <nombre> &7— Muestra los detalles de un pad'
  - '&a/sj tp <nombre> &7— Teletranspórtate a un pad'
  - '&a/sj gui &7— Explora todos los pads en un menú (clic para teletransportarte)'
  - '&a/sj near [radio] &7— Lista los pads cercanos a ti'
  - '&a/sj stats &7— Estadísticas de lanzamientos y pads más usados'
  - '&a/sj toggle <pad> &7— Activa o desactiva un pad'
  - '&a/sj rename <pad> <nuevonombre> &7— Renombra un pad'
  - '&a/sj seteffect <pad> <efecto|none> [s] [nvl] &7— Efecto de poción al usarlo'
  - '&a/sj setmessage <pad> <texto|none> &7— Mensaje en la actionbar al usarlo'
  - '&a/sj sethologram <pad> <texto|none> &7— Holograma flotante sobre el pad'
  - '&a/sj setpower <nombre> <valor> &7— Cambia la potencia horizontal'
  - '&a/sj setvertical <nombre> <valor> &7— Cambia la potencia vertical'
  - '&a/sj setcooldown <pad> <ms|default> &7— Cooldown por pad'
  - '&a/sj setcommand <pad> <comando|none> &7— Comando de consola al usarlo'
  - '&a/sj setroute <pad> <ruta|none> &7— Haz que un pad lleve volando por una ruta'
  - '&a/sj setdirection <pad> <look|here> &7— Lanzar hacia donde miran, o en dirección fija'
  - '&a/sj setsound <pad> <sonido|default> &7— Sonido de lanzamiento por pad'
  - '&a/sj setparticle <pad> <partícula|default> &7— Partícula de lanzamiento por pad'
  - '&a/sj route create <nombre> &7— Crea una ruta de vuelo en tu posición'
  - '&a/sj route addpoint <nombre> &7— Añade tu posición a una ruta'
  - '&a/sj route delpoint <nombre> <número> &7— Elimina un punto'
  - '&a/sj route remove <nombre> &7— Elimina una ruta'
  - '&a/sj route list &7— Lista todas las rutas'
  - '&a/sj route info <nombre> &7— Muestra los puntos de una ruta'
  - '&a/sj reload &7— Recarga configuración, pads y rutas'
  - '&a&m--------------------------------------------'
