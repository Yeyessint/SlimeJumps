tutorial-1-title: 'Bienvenido a SlimeJumps'
tutorial-1-body:
  - '&7SlimeJumps añade &ajump pads&7 — las plataformas de salto de los'
  - '&7lobbies que lanzan a los jugadores por los aires al pisarlas.'
  - '&7También puedes crear &arutas de vuelo&7, &apads de carga&7 y &adoble salto&7.'
  - '&8Ideal para: parkour de lobby, lanzadores hub → minijuego, castillos'
  - '&8hinchables, viajes en cañón, atajos secretos y saltos ocultos.'
  - '&7Haz clic en &aSiguiente »&7 para crear tu primer pad.'
tutorial-2-title: 'Crea tu primer pad'
tutorial-2-body:
  - '&7Ponte sobre el bloque que quieras convertir en pad y ejecuta:'
  - '&a  /sj create <nombre> [potencia] [vertical]'
  - '&8• &7nombre &8= id único, p. ej. &fspawn&8 (letras, números, - y _)'
  - '&8• &7potencia &8= empuje horizontal &7(opcional, por defecto 1.6)'
  - '&8• &7vertical &8= empuje hacia arriba &7(opcional, por defecto 1.0)'
  - '&7Ejemplo: &f/sj create spawn&7 — ¡luego pisa el bloque!'
tutorial-3-title: 'Ajusta el lanzamiento y previsualiza'
tutorial-3-body:
  - '&7Cambia la fuerza cuando quieras sin recrear el pad:'
  - '&a  /sj setpower spawn 2.5   &8(más lejos)'
  - '&a  /sj setvertical spawn 1.3 &8(más alto)'
  - '&7¿No sabes dónde caen? &aPrevisualiza la parábola exacta:'
  - '&a  /sj preview spawn'
  - '&8Dibuja la trayectoria con partículas durante unos segundos.'
tutorial-4-title: 'Dale un aspecto genial'
tutorial-4-body:
  - '&7Da a cada pad sus propios efectos:'
  - '&a  /sj setparticle spawn FIREWORK'
  - '&a  /sj setsound spawn entity.bat.takeoff'
  - '&a  /sj seteffect spawn SPEED 5 1   &8(efecto, segundos, nivel)'
  - '&a  /sj sethologram spawn &f&aSALTA!&7|&fal spawn   &8(| = nueva línea)'
  - '&a  /sj setmessage spawn &f¡Yuju!   &8(se muestra en la actionbar)'
tutorial-5-title: 'La varita de edición'
tutorial-5-body:
  - '&7¿Prefieres hacer clic a escribir? Consigue la varita:'
  - '&a  /sj wand'
  - '&8• &7Clic izquierdo&8 en un bloque → crea un pad al instante'
  - '&8• &7Clic derecho&8 en un pad → lo elimina'
  - '&7Perfecto para colocar muchos pads rápido mientras construyes.'
tutorial-6-title: 'Rutas de vuelo'
tutorial-6-body:
  - '&7Las rutas llevan volando a los jugadores por puntos hasta un destino:'
  - '&a  /sj route create lobby2arena'
  - '&a  /sj route edit lobby2arena   &8(editor visual + varita)'
  - '&8En modo edición: clic izq. añade un punto, clic der. lo elimina.'
  - '&7Luego vincula un pad a la ruta:'
  - '&a  /sj setroute spawn lobby2arena'
tutorial-7-title: 'Pads de carga y presets'
tutorial-7-body:
  - '&7Convierte un pad en &apad de carga&7 — mantente encima y sal disparado:'
  - '&a  /sj setcharge spawn 1500   &8(ms para carga total; off para quitar)'
  - '&7O crea pads ya configurados al instante con &apresets&7:'
  - '&a  /sj create salto1 --preset parkour'
  - '&8Presets: &fparkour&8 (ágil), &fcannon&8 (potente), &fbounce&8 (hacia arriba).'
  - '&7Añade tus propios presets en &fconfig.yml&7.'
tutorial-8-title: '¡Ya estás listo!'
tutorial-8-body:
  - '&7Unos últimos consejos:'
  - '&8• &a/sj menu &8— un menú clicable para crear pads y rutas'
  - '&8• &a/sj gui &8— explora y teletranspórtate a cualquier pad'
  - '&8• &a/sj list&8, &a/sj near&8, &a/sj stats &8— busca y controla pads'
  - '&8• Activa el &adoble salto&8 y elige &aidioma&8 en &fconfig.yml'
  - '&8• Placeholders como &f%slimejumps_player_launches%&8 con PlaceholderAPI'
  - '&7Haz clic en &a✔ Terminar&7 para cerrar el tutorial.'
tutorial-finished:
  - '&2&m                                            '
  - '&a&l¡Y ya está! &7Ya conoces lo esencial de SlimeJumps.'
  - '&7Documentación completa: &fgithub.com/Yeyessint/SlimeJumps'
  - '&7Reábrelo con &a/sj tutorial&7 · lista de comandos: &a/sj help'
  - '&2&m                                            '

help:
  - '&a&m--------------&a&l SlimeJumps &a&m--------------'
  - '&a/sj create <nombre> [potencia] [vertical] &7— Crea un pad en el bloque donde estás'
  - '&a/sj create <nombre> --preset <preset> &7— Crea un pad desde un preset (parkour, cannon, bounce…)'
  - '&a/sj wand &7— Consigue la varita de edición (clic izq. crea, clic der. elimina)'
  - '&a/sj remove <nombre> &7— Elimina un pad'
  - '&a/sj list &7— Lista todos los pads'
  - '&a/sj info <nombre> &7— Muestra los detalles de un pad'
  - '&a/sj tp <nombre> &7— Teletranspórtate a un pad'
  - '&a/sj tutorial &7— Tutorial interactivo paso a paso'
  - '&a/sj menu &7— Menú clicable para crear pads y rutas'
  - '&a/sj gui &7— Explora todos los pads en un menú (clic para teletransportarte)'
  - '&a/sj near [radio] &7— Lista los pads cercanos a ti'
  - '&a/sj stats &7— Estadísticas de lanzamientos y pads más usados'
  - '&a/sj toggle <pad> &7— Activa o desactiva un pad'
  - '&a/sj rename <pad> <nuevonombre> &7— Renombra un pad'
  - '&a/sj seteffect <pad> <efecto|none> [s] [nvl] &7— Efecto de poción al usarlo'
  - '&a/sj setmessage <pad> <texto|none> &7— Mensaje en la actionbar al usarlo'
  - '&a/sj sethologram <pad> <texto|none> &7— Holograma flotante sobre el pad'
  - '&a/sj setcharge <pad> <ms|off> &7— Convierte un pad en pad de carga'
  - '&a/sj preview <pad> &7— Dibuja la trayectoria de lanzamiento con partículas'
  - '&a/sj route edit <nombre> &7— Editor visual de rutas (la varita añade/quita puntos)'
  - '&a/sj setpower <nombre> <valor> &7— Cambia la potencia horizontal'
  - '&a/sj setvertical <nombre> <valor> &7— Cambia la potencia vertical'
  - '&a/sj setcooldown <pad> <ms|default> &7— Cooldown por pad'
  - '&a/sj setcommand <pad> <comando|none> &7— Comando de consola al usarlo'
  - '&a/sj setroute <pad> <ruta|none> &7— Haz que un pad lleve volando por una ruta'
  - '&a/sj setdirection <pad> <look|here> &7— Lanzar hacia donde miran, o en dirección fija'
  - '&a/sj setsound <pad> <sonido|default> &7— Sonido de lanzamiento por pad'
  - '&a/sj setparticle <pad> <partícula|default> &7— Partícula de lanzamiento por pad'
  - '&a/sj route create <nombre> &7— Crea una ruta de vuelo en tu posición'
  - '&a/sj route addpoint <nombre> &7— Añade tu posición a una ruta'
  - '&a/sj route delpoint <nombre> <número> &7— Elimina un punto'
  - '&a/sj route remove <nombre> &7— Elimina una ruta'
  - '&a/sj route list &7— Lista todas las rutas'
  - '&a/sj route info <nombre> &7— Muestra los puntos de una ruta'
  - '&a/sj reload &7— Recarga configuración, pads y rutas'
  - '&a&m--------------------------------------------'
