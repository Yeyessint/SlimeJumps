name: Maintenance

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  cleanup-merged-branches:
    name: Delete merged branches
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete branches already merged into master
        run: |
          for branch in $(git branch -r --merged origin/master | sed 's|^ *origin/||' | grep -vE '^(master$|HEAD)'); do
            git push origin --delete "$branch" || true
          done

  prune-run-history:
    name: Prune old workflow runs
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Delete completed workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const run of runs) {
              if (run.status === 'completed' && run.id !== context.runId) {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                }).catch(() => {});
              }
            }
