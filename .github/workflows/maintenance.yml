name: Maintenance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-merged-branches:
    name: Delete merged branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete branches already merged into master
        run: |
          for branch in $(git branch -r --merged origin/master | sed 's|^ *origin/||' | grep -vE '^(master$|HEAD)'); do
            git push origin --delete "$branch" || true
          done
